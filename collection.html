<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVL Collection</title>

    <!-- Global css and toast -->
    <link rel="stylesheet" href="./css/shared/sharedCss.css">
    <link rel="stylesheet" href="./css/components/productGrid.css">
    <link rel="stylesheet" href="./css/components/productCard.css">

    <!-- navbar and footer -->
    <link rel="stylesheet" href="./css/components/navbar.css">
    <link rel="stylesheet" href="./css/components/footer.css">

    <!-- page specific css -->
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/pages/collection.css">

</head>

<body>

    <header id="navbar"></header>

    <section class="hero">
        <img src="./assets/images/mens-denim-fashion.jpg" alt="Premium Denim Collection"
            class="hero-img collection-hero-img">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-heading">Premium Denim Collection</h1>
            <p class="hero-subtitle">Premium denim engineered for everyday wear and timeless style.</p>
            <a href="#product-cards-container" class="hero-btn">Shop Now</a>
        </div>
    </section>

    <main class="container">

        <h1 class="section-title" id="page-title">Collection</h1>

        <section class="filters">
            <select id="color-filter">
                <option value="">All Colors</option>
                <option value="blue">Blue</option>
                <option value="black">Black</option>
                <option value="grey">Grey</option>
            </select>

            <select id="price-filter">
                <option value="">Sort by Price</option>
                <option value="low">Low → High</option>
                <option value="high">High → Low</option>
            </select>

            <button class="clear-filters">Clear Filters</button>
        </section>

        <div id="product-cards-container" class="products-grid"></div>

    </main>

    <div id="footer"></div>

    <script type="module" src="./js/pages/collection.js"></script>
</body>

</html>
